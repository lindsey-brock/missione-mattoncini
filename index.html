<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Missione Mattoncini</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --midnight: #0D1B2A;
    --navy: #1A2E45;
    --brick: #E03A2F;
    --gold: #F5C842;
    --aqua: #7EDCCA;
    --white: #F8F6F0;
    --muted: #8A9BB0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--midnight);
    font-family: 'DM Sans', sans-serif;
    color: var(--white);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  /* HERO STAGE */
  .hero {
    width: 100vw;
    height: 100vh;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* STARS */
  .stars {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  .star {
    position: absolute;
    background: var(--white);
    border-radius: 50%;
    animation: twinkle var(--duration) ease-in-out infinite var(--delay);
    opacity: 0;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0; transform: scale(0.8); }
    50% { opacity: var(--max-opacity); transform: scale(1); }
  }

  /* CLOUDS - hand drawn SVG style */
  .clouds {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  .cloud {
    position: absolute;
    opacity: 0;
  }

  .cloud-left {
    left: -300px;
    top: 30%;
    animation: cloudRevealLeft 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    animation-delay: 2.8s;
  }

  .cloud-right {
    right: -300px;
    top: 25%;
    animation: cloudRevealRight 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    animation-delay: 2.8s;
  }

  .cloud-top-left {
    left: -200px;
    top: 10%;
    animation: cloudRevealLeft 1s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    animation-delay: 3.1s;
  }

  .cloud-top-right {
    right: -200px;
    top: 8%;
    animation: cloudRevealRight 1s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    animation-delay: 3.1s;
  }

  @keyframes cloudRevealLeft {
    0% { opacity: 0; transform: translateX(0); }
    20% { opacity: 1; }
    100% { opacity: 1; transform: translateX(320px); }
  }

  @keyframes cloudRevealRight {
    0% { opacity: 0; transform: translateX(0); }
    20% { opacity: 1; }
    100% { opacity: 1; transform: translateX(-320px); }
  }

  /* ROCKET WRAPPER */
  .rocket-wrapper {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    bottom: -200px;
    animation: rocketLaunch 2.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    animation-delay: 0.3s;
  }

  @keyframes rocketLaunch {
    0% { bottom: -200px; opacity: 1; }
    60% { bottom: 38%; opacity: 1; }
    75% { bottom: 40%; opacity: 1; }
    85% { bottom: 42%; opacity: 1; }
    100% { bottom: 40%; opacity: 1; }
  }

  /* ROCKET SVG */
  .rocket-svg {
    width: 100px;
    height: 140px;
    filter: drop-shadow(0 0 20px rgba(245, 200, 66, 0.4));
    animation: rocketWobble 3s ease-in-out infinite;
    animation-delay: 2.5s;
  }

  @keyframes rocketWobble {
    0%, 100% { transform: rotate(-1deg) translateY(0px); }
    25% { transform: rotate(1deg) translateY(-3px); }
    75% { transform: rotate(-0.5deg) translateY(2px); }
  }

  /* FLAME */
  .flame-wrapper {
    position: relative;
    width: 60px;
    height: 80px;
    margin-top: -8px;
  }

  .flame-outer {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 44px;
    height: 70px;
    background: linear-gradient(to top, #FF6B00, #F5C842, transparent);
    border-radius: 50% 50% 20% 20% / 60% 60% 40% 40%;
    animation: flameOuter 0.15s ease-in-out infinite alternate;
    filter: blur(2px);
    opacity: 0.9;
  }

  .flame-mid {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 28px;
    height: 55px;
    background: linear-gradient(to top, #FF8C00, #FFD700, #F5C842, transparent);
    border-radius: 50% 50% 20% 20% / 60% 60% 40% 40%;
    animation: flameMid 0.12s ease-in-out infinite alternate;
    filter: blur(1px);
    opacity: 0.95;
  }

  .flame-inner {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 16px;
    height: 40px;
    background: linear-gradient(to top, #fff, #7EDCCA, transparent);
    border-radius: 50% 50% 20% 20% / 60% 60% 40% 40%;
    animation: flameInner 0.1s ease-in-out infinite alternate;
    opacity: 0.8;
  }

  /* Spark particles */
  .sparks {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    width: 60px;
    height: 60px;
  }

  .spark {
    position: absolute;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: var(--gold);
    animation: sparkFly var(--spark-dur) ease-out infinite var(--spark-delay);
    left: 50%;
    bottom: 0;
    opacity: 0;
  }

  @keyframes sparkFly {
    0% { opacity: 1; transform: translate(var(--sx), 0) scale(1); }
    100% { opacity: 0; transform: translate(var(--sx), var(--sy)) scale(0.2); }
  }

  @keyframes flameOuter {
    0% { height: 70px; width: 44px; transform: translateX(-50%) skewX(-2deg); }
    100% { height: 80px; width: 40px; transform: translateX(-50%) skewX(2deg); }
  }

  @keyframes flameMid {
    0% { height: 55px; width: 28px; transform: translateX(-50%) skewX(1deg); }
    100% { height: 62px; width: 24px; transform: translateX(-50%) skewX(-1deg); }
  }

  @keyframes flameInner {
    0% { height: 40px; transform: translateX(-50%) scaleX(1); }
    100% { height: 45px; transform: translateX(-50%) scaleX(0.85); }
  }

  /* LOGO REVEAL */
  .logo-reveal {
    position: absolute;
    bottom: 22%;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    opacity: 0;
    animation: logoFadeIn 1s ease-out forwards;
    animation-delay: 3.6s;
    white-space: nowrap;
  }

  .logo-line1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(2.5rem, 7vw, 5rem);
    color: var(--white);
    letter-spacing: -0.02em;
    line-height: 1;
    display: block;
  }

  .logo-line2 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(2.5rem, 7vw, 5rem);
    color: var(--gold);
    letter-spacing: -0.02em;
    line-height: 1;
    display: block;
    margin-top: 4px;
  }

  .logo-sub {
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    font-size: clamp(0.6rem, 1.5vw, 0.85rem);
    color: var(--aqua);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    margin-top: 16px;
    display: block;
    opacity: 0;
    animation: logoFadeIn 0.8s ease-out forwards;
    animation-delay: 4.2s;
  }

  @keyframes logoFadeIn {
    0% { opacity: 0; transform: translateY(12px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  /* SMOKE TRAIL */
  .smoke-trail {
    position: absolute;
    bottom: 35%;
    left: 50%;
    transform: translateX(-50%);
    width: 4px;
    background: linear-gradient(to bottom, transparent, rgba(126,220,202,0.15), rgba(126,220,202,0.05));
    height: 0;
    animation: smokeGrow 2s ease-out forwards;
    animation-delay: 0.5s;
    border-radius: 2px;
    filter: blur(2px);
  }

  @keyframes smokeGrow {
    0% { height: 0; opacity: 0.6; }
    100% { height: 200px; opacity: 0.3; }
  }

  /* GLOW BEHIND ROCKET */
  .rocket-glow {
    position: absolute;
    width: 160px;
    height: 160px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(245,200,66,0.15) 0%, transparent 70%);
    animation: glowPulse 1.5s ease-in-out infinite;
    animation-delay: 2.5s;
    opacity: 0;
  }

  @keyframes glowPulse {
    0%, 100% { opacity: 0.4; transform: scale(1); }
    50% { opacity: 0.8; transform: scale(1.2); }
  }

  /* TAGLINE */
  .tagline-reveal {
    position: absolute;
    bottom: 16%;
    left: 50%;
    transform: translateX(-50%);
    opacity: 0;
    animation: logoFadeIn 0.8s ease-out forwards;
    animation-delay: 4.6s;
    text-align: center;
  }

  .tagline-text {
    font-family: 'Syne', sans-serif;
    font-weight: 400;
    font-size: clamp(0.75rem, 2vw, 1rem);
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .tagline-text em {
    color: var(--aqua);
    font-style: normal;
  }

  /* CTA */
  .cta-reveal {
    position: absolute;
    bottom: 8%;
    left: 50%;
    transform: translateX(-50%);
    opacity: 0;
    animation: logoFadeIn 0.8s ease-out forwards;
    animation-delay: 5s;
  }

  .cta-btn {
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 0.85rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--midnight);
    background: var(--gold);
    padding: 14px 32px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .cta-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(245,200,66,0.35);
  }
</style>
</head>
<body>

<div class="hero">

  <!-- STARS -->
  <div class="stars" id="stars"></div>

  <!-- CLOUDS -->
  <div class="clouds">
    <!-- Large cloud left -->
    <div class="cloud cloud-left">
      <svg width="280" height="120" viewBox="0 0 280 120" fill="none">
        <path d="M20 80 Q10 60 30 55 Q25 30 55 32 Q60 15 85 20 Q95 5 120 15 Q140 5 160 18 Q180 8 195 25 Q220 20 230 40 Q250 38 255 58 Q270 60 265 78 Q260 90 240 88 Q200 100 160 95 Q120 105 80 98 Q40 102 20 80Z" 
              fill="#F8F6F0" opacity="0.12" stroke="#F8F6F0" stroke-width="1.5" stroke-opacity="0.2"/>
        <path d="M20 80 Q10 60 30 55 Q25 30 55 32 Q60 15 85 20 Q95 5 120 15 Q140 5 160 18 Q180 8 195 25 Q220 20 230 40 Q250 38 255 58 Q270 60 265 78 Q260 90 240 88 Q200 100 160 95 Q120 105 80 98 Q40 102 20 80Z" 
              fill="none" stroke="#7EDCCA" stroke-width="1" stroke-opacity="0.15" stroke-dasharray="4 6"/>
      </svg>
    </div>

    <!-- Large cloud right -->
    <div class="cloud cloud-right">
      <svg width="260" height="110" viewBox="0 0 260 110" fill="none">
        <path d="M240 75 Q255 55 235 50 Q242 28 210 28 Q208 12 180 16 Q172 4 148 14 Q128 3 108 16 Q88 6 72 24 Q48 20 42 42 Q22 44 18 64 Q12 78 30 82 Q70 96 110 90 Q148 100 190 92 Q228 98 240 75Z" 
              fill="#F8F6F0" opacity="0.12" stroke="#F8F6F0" stroke-width="1.5" stroke-opacity="0.2"/>
        <path d="M240 75 Q255 55 235 50 Q242 28 210 28 Q208 12 180 16 Q172 4 148 14 Q128 3 108 16 Q88 6 72 24 Q48 20 42 42 Q22 44 18 64 Q12 78 30 82 Q70 96 110 90 Q148 100 190 92 Q228 98 240 75Z" 
              fill="none" stroke="#7EDCCA" stroke-width="1" stroke-opacity="0.15" stroke-dasharray="4 6"/>
      </svg>
    </div>

    <!-- Small cloud top left -->
    <div class="cloud cloud-top-left">
      <svg width="180" height="80" viewBox="0 0 180 80" fill="none">
        <path d="M15 55 Q8 40 22 36 Q18 18 42 20 Q46 8 68 12 Q84 2 100 14 Q118 6 130 22 Q148 20 152 38 Q165 42 160 56 Q154 68 135 64 Q100 74 65 68 Q30 72 15 55Z" 
              fill="#F8F6F0" opacity="0.1" stroke="#F8F6F0" stroke-width="1.2" stroke-opacity="0.18"/>
      </svg>
    </div>

    <!-- Small cloud top right -->
    <div class="cloud cloud-top-right">
      <svg width="200" height="85" viewBox="0 0 200 85" fill="none">
        <path d="M185 58 Q196 42 180 37 Q186 18 158 18 Q156 6 132 10 Q120 1 100 12 Q80 3 62 18 Q40 14 34 32 Q16 35 12 52 Q8 65 28 68 Q66 78 104 72 Q142 80 170 72 Q192 76 185 58Z" 
              fill="#F8F6F0" opacity="0.1" stroke="#F8F6F0" stroke-width="1.2" stroke-opacity="0.18"/>
      </svg>
    </div>
  </div>

  <!-- SMOKE TRAIL -->
  <div class="smoke-trail"></div>

  <!-- ROCKET -->
  <div class="rocket-wrapper">
    <div class="rocket-glow"></div>

    <!-- Rocket SVG -->
    <svg class="rocket-svg" viewBox="0 0 100 140" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Body -->
      <rect x="32" y="28" width="36" height="72" rx="18" fill="#F5C842"/>
      <!-- Nose cone -->
      <path d="M32 46 Q50 8 68 46Z" fill="#F5C842"/>
      <!-- Nose highlight -->
      <path d="M38 44 Q50 16 56 38" stroke="#FFE080" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
      <!-- Window -->
      <circle cx="50" cy="62" r="10" fill="#1A2E45"/>
      <circle cx="50" cy="62" r="8" fill="#0D1B2A"/>
      <circle cx="47" cy="59" r="2.5" fill="#7EDCCA" opacity="0.7"/>
      <!-- LEGO studs on body -->
      <circle cx="43" cy="78" r="3" fill="#E03A2F" opacity="0.8"/>
      <circle cx="50" cy="78" r="3" fill="#E03A2F" opacity="0.8"/>
      <circle cx="57" cy="78" r="3" fill="#E03A2F" opacity="0.8"/>
      <circle cx="43" cy="87" r="3" fill="#E03A2F" opacity="0.6"/>
      <circle cx="57" cy="87" r="3" fill="#E03A2F" opacity="0.6"/>
      <!-- Left wing -->
      <path d="M32 72 L14 102 L32 96Z" fill="#E03A2F"/>
      <path d="M32 72 L14 102 L32 96Z" stroke="#C02A1F" stroke-width="0.5"/>
      <!-- Right wing -->
      <path d="M68 72 L86 102 L68 96Z" fill="#E03A2F"/>
      <path d="M68 72 L86 102 L68 96Z" stroke="#C02A1F" stroke-width="0.5"/>
      <!-- Bottom nozzle -->
      <path d="M38 98 Q50 104 62 98 L60 110 Q50 116 40 110Z" fill="#1A2E45"/>
      <path d="M42 100 Q50 106 58 100 L57 108 Q50 112 43 108Z" fill="#0D1B2A"/>
    </svg>

    <!-- FLAME -->
    <div class="flame-wrapper">
      <div class="flame-outer"></div>
      <div class="flame-mid"></div>
      <div class="flame-inner"></div>
      <div class="sparks" id="sparks"></div>
    </div>
  </div>

  <!-- LOGO REVEAL -->
  <div class="logo-reveal">
    <span class="logo-line1">Missione</span>
    <span class="logo-line2">Mattoncini</span>
    <span class="logo-sub">STEM · Lego · English · Creativity</span>
  </div>

  <!-- TAGLINE -->
  <div class="tagline-reveal">
    <div class="tagline-text">Costruiamo. Esploriamo. <em>Impariamo.</em></div>
  </div>

  <!-- CTA -->
  <div class="cta-reveal">
    <button class="cta-btn">Scopri i Workshop →</button>
  </div>

</div>

<script>
  // Generate stars
  const starsContainer = document.getElementById('stars');
  for (let i = 0; i < 120; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    star.style.cssText = `
      width: ${size}px;
      height: ${size}px;
      left: ${Math.random() * 100}%;
      top: ${Math.random() * 70}%;
      --duration: ${Math.random() * 3 + 2}s;
      --delay: ${Math.random() * 4}s;
      --max-opacity: ${Math.random() * 0.6 + 0.2};
    `;
    starsContainer.appendChild(star);
  }

  // Generate sparks
  const sparksContainer = document.getElementById('sparks');
  for (let i = 0; i < 12; i++) {
    const spark = document.createElement('div');
    spark.className = 'spark';
    const angle = (Math.random() * 160 + 10) * (Math.PI / 180);
    const dist = Math.random() * 40 + 15;
    spark.style.cssText = `
      --sx: ${Math.cos(angle) * dist}px;
      --sy: ${Math.sin(angle) * dist + 20}px;
      --spark-dur: ${Math.random() * 0.4 + 0.3}s;
      --spark-delay: ${Math.random() * 0.5}s;
      background: ${Math.random() > 0.5 ? '#F5C842' : '#7EDCCA'};
      width: ${Math.random() * 2 + 1.5}px;
      height: ${Math.random() * 2 + 1.5}px;
    `;
    sparksContainer.appendChild(spark);
  }
</script>

</body>
</html>
