<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Missione Mattoncini</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --midnight: #0D1B2A;
    --navy: #1A2E45;
    --brick: #E03A2F;
    --gold: #F5C842;
    --aqua: #7EDCCA;
    --white: #F8F6F0;
    --muted: #8A9BB0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--midnight);
    font-family: 'DM Sans', sans-serif;
    color: var(--white);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  /* STARS */
  .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .star {
    position: absolute;
    background: var(--white);
    border-radius: 50%;
    animation: twinkle var(--duration) ease-in-out infinite var(--delay);
    opacity: 0;
  }
  @keyframes twinkle {
    0%,100% { opacity: 0; }
    50% { opacity: var(--max-opacity); }
  }

  /* NAV */
  .nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 72px;
    display: flex;
    align-items: center;
    padding: 0 40px;
    z-index: 100;
    opacity: 0;
    background: transparent;
    transition: background 0.4s;
  }
  .nav.visible {
    animation: navReveal 0.6s ease-out forwards;
  }
  @keyframes navReveal {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .nav-logo {
    display: flex;
    align-items: center;
    gap: 12px;
    opacity: 0;
  }
  .nav-logo.visible {
    animation: fadeUp 0.5s ease-out forwards;
  }
  .nav-rocket-icon {
    width: 36px;
    height: 36px;
  }
  .nav-logo-text {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.1rem;
    color: var(--white);
    letter-spacing: -0.01em;
  }
  .nav-logo-text span { color: var(--gold); }
  .nav-links {
    margin-left: auto;
    display: flex;
    gap: 32px;
    opacity: 0;
  }
  .nav-links.visible {
    animation: fadeUp 0.5s ease-out 0.15s forwards;
  }
  .nav-links a {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--white); }

  /* HERO */
  .hero {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1;
  }

  /* TITLE BLOCK */
  .title-block {
    text-align: center;
    position: relative;
    z-index: 2;
    margin-top: -40px;
  }
  .title-line {
    display: block;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(3.5rem, 10vw, 7rem);
    letter-spacing: -0.03em;
    line-height: 0.95;
    opacity: 0;
    clip-path: inset(0 100% 0 0);
  }
  .title-line.line1 { color: var(--white); }
  .title-line.line2 { color: var(--gold); }
  .title-line.reveal {
    animation: textReveal 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
  }
  @keyframes textReveal {
    0% { opacity: 1; clip-path: inset(0 100% 0 0); }
    100% { opacity: 1; clip-path: inset(0 0% 0 0); }
  }

  .subtitle {
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    font-size: clamp(0.65rem, 1.5vw, 0.85rem);
    color: var(--aqua);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    margin-top: 20px;
    opacity: 0;
  }
  .subtitle.visible { animation: fadeUp 0.6s ease-out forwards; }

  .tagline {
    font-family: 'Syne', sans-serif;
    font-weight: 400;
    font-size: clamp(0.85rem, 2vw, 1.1rem);
    color: var(--muted);
    letter-spacing: 0.04em;
    margin-top: 12px;
    opacity: 0;
  }
  .tagline em { color: var(--aqua); font-style: normal; }
  .tagline.visible { animation: fadeUp 0.6s ease-out forwards; }

  .cta-wrap {
    margin-top: 32px;
    opacity: 0;
  }
  .cta-wrap.visible { animation: fadeUp 0.6s ease-out forwards; }
  .cta-btn {
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 0.85rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--midnight);
    background: var(--gold);
    padding: 15px 36px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .cta-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(245,200,66,0.35);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ROCKET */
  .rocket-container {
    position: fixed;
    z-index: 50;
    pointer-events: none;
    /* Start bottom-right */
    bottom: -120px;
    right: -80px;
    width: 80px;
    height: 120px;
  }
  .rocket-svg { width: 80px; height: 110px; }

  /* FIRE TRAIL - canvas based */
  #trail-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 49;
  }

  /* FLAME UNDER ROCKET */
  .flame-wrap {
    position: absolute;
    bottom: -10px;
    left: 50%;
    transform: translateX(-50%);
    width: 40px;
    height: 60px;
  }
  .fl-outer {
    position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 32px; height: 52px;
    background: linear-gradient(to top, #FF6B00, #F5C842, transparent);
    border-radius: 50% 50% 20% 20% / 60% 60% 40% 40%;
    animation: fo 0.14s ease-in-out infinite alternate;
    filter: blur(2px); opacity: 0.9;
  }
  .fl-mid {
    position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 20px; height: 40px;
    background: linear-gradient(to top, #FF8C00, #FFD700, transparent);
    border-radius: 50% 50% 20% 20% / 60% 60% 40% 40%;
    animation: fm 0.11s ease-in-out infinite alternate;
    filter: blur(1px); opacity: 0.95;
  }
  .fl-inner {
    position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 10px; height: 28px;
    background: linear-gradient(to top, #fff, #7EDCCA, transparent);
    border-radius: 50% 50% 20% 20% / 60% 60% 40% 40%;
    animation: fi 0.09s ease-in-out infinite alternate;
    opacity: 0.85;
  }
  @keyframes fo { 0% { height:52px;width:32px; } 100% { height:60px;width:28px; } }
  @keyframes fm { 0% { height:40px;width:20px; } 100% { height:46px;width:16px; } }
  @keyframes fi { 0% { height:28px; } 100% { height:33px; } }

  /* CLOUDS */
  .cloud {
    position: fixed;
    opacity: 0;
    pointer-events: none;
    z-index: 3;
  }
  .cloud-1 { left: -280px; top: 12%; }
  .cloud-2 { right: -260px; top: 8%; }
  .cloud-3 { left: -240px; top: 55%; }
  .cloud-4 { right: -220px; top: 60%; }

  .cloud-1.show { animation: cL 1.1s cubic-bezier(.25,.46,.45,.94) forwards; }
  .cloud-2.show { animation: cR 1.1s cubic-bezier(.25,.46,.45,.94) forwards; }
  .cloud-3.show { animation: cL2 1s cubic-bezier(.25,.46,.45,.94) forwards; }
  .cloud-4.show { animation: cR2 1s cubic-bezier(.25,.46,.45,.94) forwards; }

  @keyframes cL  { 0%{opacity:0;transform:translateX(0)} 15%{opacity:1} 100%{opacity:1;transform:translateX(300px)} }
  @keyframes cR  { 0%{opacity:0;transform:translateX(0)} 15%{opacity:1} 100%{opacity:1;transform:translateX(-300px)} }
  @keyframes cL2 { 0%{opacity:0;transform:translateX(0)} 15%{opacity:0.7} 100%{opacity:0.7;transform:translateX(260px)} }
  @keyframes cR2 { 0%{opacity:0;transform:translateX(0)} 15%{opacity:0.7} 100%{opacity:0.7;transform:translateX(-260px)} }
</style>
</head>

<script>
// STARS
const starsEl = document.getElementById('stars');
for (let i = 0; i < 130; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const sz = Math.random() * 2.2 + 0.4;
  s.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--duration:${Math.random()*3+2}s;--delay:${Math.random()*5}s;--max-opacity:${Math.random()*0.55+0.15}`;
  starsEl.appendChild(s);
}

// TRAIL CANVAS
const canvas = document.getElementById('trail-canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const particles = [];
function addParticle(x, y, angle) {
  const spread = 0.4;
  const a = angle + (Math.random() - 0.5) * spread;
  particles.push({
    x, y,
    vx: Math.cos(a) * (Math.random() * 2 + 1),
    vy: Math.sin(a) * (Math.random() * 2 + 1),
    life: 1,
    size: Math.random() * 6 + 3,
    color: Math.random() > 0.5 ? '#F5C842' : (Math.random() > 0.5 ? '#FF6B00' : '#7EDCCA')
  });
}

function updateTrail() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life -= 0.03;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    ctx.globalAlpha = p.life * 0.7;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ROCKET ANIMATION
const rocket = document.getElementById('rocket');
const line1 = document.getElementById('line1');
const line2 = document.getElementById('line2');

// Get element positions after load
let titleRect, line1Rect, line2Rect;

function getTitlePositions() {
  titleRect = document.querySelector('.title-block').getBoundingClientRect();
  line1Rect = line1.getBoundingClientRect();
  line2Rect = line2.getBoundingClientRect();
}

// Rocket state
let rocketX = window.innerWidth + 80;
let rocketY = window.innerHeight + 80;
let rocketAngle = -Math.PI / 4; // pointing up-left
let phase = 0;
let phaseT = 0;
let animating = true;
let lastTime = 0;

// Waypoints for rocket path
// Phase 0: enter from bottom-right, arc toward line1
// Phase 1: zoom across line1 (left to right)  
// Phase 2: loop back, zoom across line2 (right to left)
// Phase 3: arc to top-left nav position

const NAV_X = 50;
const NAV_Y = 36;

function easeInOut(t) {
  return t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
}

function lerp(a, b, t) { return a + (b - a) * t; }

// Bezier helper
function bezier(p0, p1, p2, p3, t) {
  const mt = 1 - t;
  return {
    x: mt*mt*mt*p0.x + 3*mt*mt*t*p1.x + 3*mt*t*t*p2.x + t*t*t*p3.x,
    y: mt*mt*mt*p0.y + 3*mt*mt*t*p1.y + 3*mt*t*t*p2.y + t*t*t*p3.y
  };
}

function bezierTangent(p0, p1, p2, p3, t) {
  const mt = 1 - t;
  return {
    x: 3*(mt*mt*(p1.x-p0.x) + 2*mt*t*(p2.x-p1.x) + t*t*(p3.x-p2.x)),
    y: 3*(mt*mt*(p1.y-p0.y) + 2*mt*t*(p2.y-p1.y) + t*t*(p3.y-p2.y))
  };
}

let paths = [];

function buildPaths() {
  const W = window.innerWidth;
  const H = window.innerHeight;
  getTitlePositions();

  const l1cy = line1Rect.top + line1Rect.height / 2;
  const l2cy = line2Rect.top + line2Rect.height / 2;

  paths = [
    // Phase 0: Enter bottom-right → position before line1 sweep (left of screen, line1 height)
    {
      p0: { x: W + 100, y: H + 100 },
      p1: { x: W * 0.7, y: H * 0.8 },
      p2: { x: W * 0.1, y: l1cy + 40 },
      p3: { x: -100, y: l1cy },
      duration: 1600
    },
    // Phase 1: Sweep left→right across line1
    {
      p0: { x: -100, y: l1cy },
      p1: { x: W * 0.3, y: l1cy - 30 },
      p2: { x: W * 0.7, y: l1cy + 20 },
      p3: { x: W + 120, y: l1cy - 10 },
      duration: 900
    },
    // Phase 2: Arc back, come from right, sweep right→left across line2
    {
      p0: { x: W + 120, y: l1cy - 10 },
      p1: { x: W * 0.9, y: l2cy - 80 },
      p2: { x: W * 0.4, y: l2cy - 40 },
      p3: { x: -120, y: l2cy },
      duration: 1000
    },
    // Phase 3: Arc from left, fly to nav top-left
    {
      p0: { x: -120, y: l2cy },
      p1: { x: W * 0.15, y: l2cy + 60 },
      p2: { x: W * 0.05, y: H * 0.3 },
      p3: { x: NAV_X, y: NAV_Y },
      duration: 1100
    }
  ];
}

let trailInterval = null;
let startTime = null;

function animate(ts) {
  if (!startTime) startTime = ts;
  const elapsed = ts - startTime;

  // Wait 0.5s before starting
  if (elapsed < 500) {
    requestAnimationFrame(animate);
    return;
  }

  updateTrail();

  if (!animating) return;

  const path = paths[phase];
  if (!path) {
    // Done — show nav
    finalizeNav();
    return;
  }

  const phaseElapsed = elapsed - 500 - paths.slice(0, phase).reduce((a, p) => a + p.duration, 0);
  const t = Math.min(phaseElapsed / path.duration, 1);
  const et = easeInOut(t);

  const pos = bezier(path.p0, path.p1, path.p2, path.p3, et);
  const tang = bezierTangent(path.p0, path.p1, path.p2, path.p3, Math.min(et + 0.01, 1));
  const angle = Math.atan2(tang.y, tang.x);

  // Position rocket (centered on path point)
  rocket.style.left = (pos.x - 40) + 'px';
  rocket.style.top = (pos.y - 55) + 'px';
  rocket.style.bottom = 'auto';
  rocket.style.right = 'auto';

  // Rotate rocket to face direction of travel
  // Rocket points up by default, so subtract 90deg
  rocket.style.transform = `rotate(${angle + Math.PI/2}rad)`;

  // Add trail particles
  if (Math.random() > 0.3) {
    for (let i = 0; i < 3; i++) {
      addParticle(pos.x, pos.y, angle + Math.PI + (Math.random()-0.5)*0.5);
    }
  }

  // Phase transitions
  if (t >= 1) {
    phase++;
    if (phase === 1) {
      // Reveal line1
      line1.classList.add('reveal');
    }
    if (phase === 2) {
      // Reveal line2
      line2.classList.add('reveal');
    }
    if (phase === 3) {
      // Clouds start
      setTimeout(() => {
        document.getElementById('c1').classList.add('show');
        document.getElementById('c2').classList.add('show');
        setTimeout(() => {
          document.getElementById('c3').classList.add('show');
          document.getElementById('c4').classList.add('show');
        }, 300);
      }, 200);
    }
    if (phase >= paths.length) {
      animating = false;
      finalizeNav();
      return;
    }
  }

  requestAnimationFrame(animate);
}

function finalizeNav() {
  // Shrink rocket to nav size, place in nav
  rocket.style.transition = 'all 0.4s ease-out';
  rocket.style.left = '32px';
  rocket.style.top = '18px';
  rocket.style.width = '36px';
  rocket.style.height = '36px';
  rocket.style.transform = 'rotate(0deg)';

  // Hide flame
  document.querySelector('.flame-wrap').style.display = 'none';

  const navEl = document.getElementById('nav');
  navEl.classList.add('visible');

  setTimeout(() => {
    document.getElementById('navLogo').classList.add('visible');
  }, 200);
  setTimeout(() => {
    document.getElementById('navLinks').classList.add('visible');
  }, 350);
  setTimeout(() => {
    document.getElementById('subtitle').classList.add('visible');
  }, 500);
  setTimeout(() => {
    document.getElementById('tagline').classList.add('visible');
  }, 750);
  setTimeout(() => {
    document.getElementById('ctaWrap').classList.add('visible');
  }, 1000);

  // Fade out trail canvas
  canvas.style.transition = 'opacity 1s';
  canvas.style.opacity = '0';
}

window.addEventListener('load', () => {
  buildPaths();
  requestAnimationFrame(animate);
});

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>
